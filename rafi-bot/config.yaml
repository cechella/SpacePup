# ============================================================
# ConfiguraГ§Гµes do Bot RAFI Forex
# Par: EURUSD# | Corretora: XM Ultra Low Standard
# ============================================================

# --- Par e corretora ---
par: "EURUSD#"                 # XM usa EURUSD# com hashtag
corretora: "XM"
tipo_conta: "Ultra Low Standard"

# --- Capital e alavancagem ---
capital_inicial: 20.0          # USD вЂ” capital de partida
alavancagem: 1000              # 1:1000 (XM Ultra Low)
tamanho_lote_minimo: 0.01      # lote mГ­nimo permitido pela XM

# --- Lote proporcional ao capital (escala com crescimento) ---
# FГіrmula: lote = (capital_atual / capital_base) Г— lote_base
#
# Exemplos com capital_base=20 e lote_base=0.10:
#   $20   в†’ 0.10 lot в†’ margem ~$11,45 в†’ pip $1,00
#   $40   в†’ 0.20 lot в†’ margem ~$22,90 в†’ pip $2,00
#   $100  в†’ 0.50 lot в†’ margem ~$57,25 в†’ pip $5,00
#   $200  в†’ 1.00 lot в†’ margem ~$114,50 в†’ pip $10,00
#   $500  в†’ 2.50 lot в†’ margem ~$286,25 в†’ pip $25,00
#   $1000 в†’ 5.00 lot в†’ margem ~$572,50 в†’ pip $50,00
#   $5000 в†’ 25.00 lot в†’ margem ~$2862,50 в†’ pip $250,00
lote_proporcional: true        # ATIVADO вЂ” com lote_base conservador (5% risco vs 25% anterior)
lote_base: 0.02               # 5% risco/trade: $200в†’0.02lot | $2000в†’0.20lot (era 0.10 = blow-up em 2026-05)
capital_base: 200.0            # base de referГЄncia para escala proporcional
lote_maximo: 100.0             # limite mГЎximo por trade (XM permite atГ© 100 lotes)
lote_fixo: 0.01               # lote fixo 0.01 ($20, pip=$0,10) para medir PF puro

# --- GestГЈo de risco ---
risco_maximo_diario: 9.0       # 900% вЂ” desativado no backtest; limite real em produГ§ГЈo
max_trades_simultaneos: 1      # 1 trade por vez (confirmado S/R antes de abrir outro)
max_perdas_por_dia: 999        # desativado no backtest вЂ” mede desempenho puro da estratГ©gia
ratio_risco_retorno: 2.5       # R:R=2.5 вЂ” com WR=37.5% dГЎ PF=1.800 (grid search #1)
candle_corpo_minimo: 0.0       # 0.0 = desativado (corpoв‰Ґ50% removeu ganhadores вЂ” TESTE K)

# --- Spread e slippage ---
spread_pips: 0.8               # spread mГ©dio EURUSD# XM Ultra Low
slippage_pips: 0.5             # slippage estimado em pontos

# --- Indicador RAFI ---
forca_limiar: 2.50             # RAFI > 2.50 para entrar (voltou ao padrГЈo; M15 Г© o novo filtro)
forca_exaustao: -1.0           # desativado: com RAFI absoluto (в‰Ґ0) nunca dispara; saГ­da sГі por SL/TP

# --- Suporte e ResistГЄncia ---
sr_lookback: 50                # candles para trГЎs para S/R (50 Г— 5min в‰€ 4h)
sr_tolerancia: 0.0005          # tolerГўncia de 5 pips para confirmar rompimento
swing_stop_lookback: 150       # OTIMIZADO via grid search: 150c=12.5h в†’ WR=37.5%, PF=1.800 в†ђ MELHOR
                               # Grid search confirmou: quanto maior o swing stop, mais espaГ§o para o trade в†’ WR sobe
                               # 50cв†’PFв‰€0.87 | 75cв†’PFв‰€1.12 | 100cв†’PFв‰€1.36 | 150cв†’PF=1.80 | 200cв†’trades insuficientes

# --- MГ©dias MГіveis (tendГЄncia M5) ---
ma_rapida: 20                  # MA20
ma_lenta: 50                   # MA50
ma_threshold: 0.0003           # 3 pips de diferenГ§a MA20-MA50 para confirmar tendГЄncia

# --- Bandas de Bollinger (timing de entrada) ---
bb_filtro_ativo: false         # false = desativado (testado: piora PF 1.118в†’0.963)
bb_periodo: 8                  # perГ­odo do BB (estratГ©gia RAFI usa 8)
bb_desvios: 2.0                # desvios padrГЈo
bb_limiar_estreita: 0.0020     # BB estreita se largura < 20 pips (squeeze)
bb_abertura_minima: 0.0003     # BB deve abrir в‰Ґ 3 pips acima do mГ­nimo recente
bb_lookback: 3                 # candles de lookback para detectar squeeze

# --- Timeframes ---
timeframes:
  - "M5"                       # apenas M5 ativo

# --- SessГµes ativas (UTC/GMT) ---
# TESTE L: 2 sessГµes (Tokyo-Londres + Londres/NY) вЂ” Tokyo-Londres confirmada melhor que esperado
sessoes:
  toquio_londres:
    inicio: "07:00"
    fim: "09:00"               # abertura Londres / Tokyo-Londres (alta volatilidade)
  londres_ny:
    inicio: "12:00"
    fim: "16:00"               # sobreposiГ§ГЈo Londres/Nova York (maior liquidez EURUSD)

# --- Backtest ---
backtest:
  data_inicio: "2023-01-01"
  data_fim: "2026-07-03"
  timeframe_base: "M5"
  incluir_spread: true
  incluir_slippage: true

# --- Logging ---
log_nivel: "INFO"
log_arquivo: "logs/rafi_bot.log"

# --- Meta de capital ($20 в†’ $300.000 em 6 meses) ---
meta_ajuste_capital: 1000.0    # a partir de $1000 recalibrar lote
meta_final: 300000.0
