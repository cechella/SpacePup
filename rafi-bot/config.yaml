# ============================================================
# Configurações do Bot RAFI Forex
# Par: EURUSD# | Corretora: XM Ultra Low Standard
# ============================================================

# --- Par e corretora ---
par: "EURUSD#"                 # XM usa EURUSD# com hashtag
corretora: "XM"
tipo_conta: "Ultra Low Standard"

# --- Capital e alavancagem ---
capital_inicial: 20.0          # USD — capital de partida
alavancagem: 1000              # 1:1000 (XM Ultra Low)
tamanho_lote_minimo: 0.01      # lote mínimo permitido pela XM

# --- Lote proporcional ao capital (escala com crescimento) ---
# Fórmula: lote = (capital_atual / capital_base) × lote_base
#
# Exemplos com capital_base=20 e lote_base=0.10:
#   $20   → 0.10 lot → margem ~$11,45 → pip $1,00
#   $40   → 0.20 lot → margem ~$22,90 → pip $2,00
#   $100  → 0.50 lot → margem ~$57,25 → pip $5,00
#   $200  → 1.00 lot → margem ~$114,50 → pip $10,00
#   $500  → 2.50 lot → margem ~$286,25 → pip $25,00
#   $1000 → 5.00 lot → margem ~$572,50 → pip $50,00
#   $5000 → 25.00 lot → margem ~$2862,50 → pip $250,00
lote_proporcional: false       # DESATIVADO: medir PF real com lote fixo antes de compor
lote_base: 0.10               # lote base: $200 → 0.10 lot | $20 → 0.01 lot | $2000 → 1.00 lot
capital_base: 200.0            # base de referência para escala proporcional
lote_maximo: 100.0             # limite máximo por trade (XM permite até 100 lotes)
lote_fixo: 0.01               # lote fixo 0.01 ($20, pip=$0,10) para medir PF puro

# --- Gestão de risco ---
risco_maximo_diario: 9.0       # 900% — desativado no backtest; limite real em produção
max_trades_simultaneos: 1      # 1 trade por vez (confirmado S/R antes de abrir outro)
max_perdas_por_dia: 999        # desativado no backtest — mede desempenho puro da estratégia
ratio_risco_retorno: 2.5       # R:R fixo 2.5 (break-even WR=28.6%)
candle_corpo_minimo: 0.50      # TESTE K: corpo do candle deve ser ≥50% do range (filtra dojis/indecisão)

# --- Spread e slippage ---
spread_pips: 0.8               # spread médio EURUSD# XM Ultra Low
slippage_pips: 0.5             # slippage estimado em pontos

# --- Indicador RAFI ---
forca_limiar: 2.50             # RAFI > 2.50 para entrar (voltou ao padrão; M15 é o novo filtro)
forca_exaustao: -1.0           # desativado: com RAFI absoluto (≥0) nunca dispara; saída só por SL/TP

# --- Suporte e Resistência ---
sr_lookback: 50                # candles para trás para S/R (50 × 5min ≈ 4h)
sr_tolerancia: 0.0005          # tolerância de 5 pips para confirmar rompimento
swing_stop_lookback: 75        # candles para swing stop (75×5min = 6.25h de fundo/topo recente)
                               # TESTE A: RR=2.5, 2 sessões → WR=31.9%, PF=1.118 (116 trades)
                               # TESTE I: +D1 filter → WR=26.2%, PF=0.943 — D1 prejudica
                               # TESTE J: só Londres/NY → WR=27.3%, PF=0.939 — Tokyo-Londres era melhor!
                               # TESTE K: restaura Tokyo-Londres + filtro corpo≥50% — alvo PF>1.3

# --- Médias Móveis (tendência M5) ---
ma_rapida: 20                  # MA20
ma_lenta: 50                   # MA50
ma_threshold: 0.0003           # 3 pips de diferença MA20-MA50 para confirmar tendência

# --- Bandas de Bollinger (timing de entrada) ---
bb_filtro_ativo: false         # false = desativado (testado: piora PF 1.118→0.963)
bb_periodo: 8                  # período do BB (estratégia RAFI usa 8)
bb_desvios: 2.0                # desvios padrão
bb_limiar_estreita: 0.0020     # BB estreita se largura < 20 pips (squeeze)
bb_abertura_minima: 0.0003     # BB deve abrir ≥ 3 pips acima do mínimo recente
bb_lookback: 3                 # candles de lookback para detectar squeeze

# --- Timeframes ---
timeframes:
  - "M5"                       # apenas M5 ativo

# --- Sessões ativas (UTC/GMT) ---
# TESTE K: restaura Tokyo-Londres (07-09h) + mantém Londres/NY (12-16h)
# Tokyo-Londres = abertura London que deu trades melhores que esperado (TESTE J confirmou)
sessoes:
  toquio_londres:
    inicio: "07:00"
    fim: "09:00"               # abertura Londres / Tokyo-Londres (alta volatilidade)
  londres_ny:
    inicio: "12:00"
    fim: "16:00"               # sobreposição Londres/Nova York (maior liquidez EURUSD)

# --- Backtest ---
backtest:
  data_inicio: "2023-01-01"
  data_fim: "2026-07-03"
  timeframe_base: "M5"
  incluir_spread: true
  incluir_slippage: true

# --- Logging ---
log_nivel: "INFO"
log_arquivo: "logs/rafi_bot.log"

# --- Meta de capital ($20 → $300.000 em 6 meses) ---
meta_ajuste_capital: 1000.0    # a partir de $1000 recalibrar lote
meta_final: 300000.0
