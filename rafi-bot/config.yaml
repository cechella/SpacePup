# ============================================================
# Configurações do Bot RAFI Forex
# Par: EURUSD# | Corretora: XM Ultra Low Standard
# ============================================================

# --- Par e corretora ---
par: "EURUSD#"                 # XM usa EURUSD# com hashtag
corretora: "XM"
tipo_conta: "Ultra Low Standard"

# --- Capital e alavancagem ---
capital_inicial: 20.0          # USD — capital de partida
alavancagem: 1000              # 1:1000 (XM Ultra Low)
tamanho_lote_minimo: 0.01      # lote mínimo permitido pela XM

# --- Sizing pelo Kelly % real (lote ajustado ao SL dinâmico) ---
# Fórmula: lote = (capital × risco_por_trade) / (risco_pips × 10)
# Vantagem: auto-corrige após perdas → previne blow-up; escala com capital
#
#   Histórico de testes:
#   TESTE A-J: lote fixo 0.01 → PF=0.871~1.118
#   TESTE K:   filtro corpo ativo → WR cai, PF piora
#   TESTE L:   sr_lookback menor → piora
#   GRID:      swing=150 → PF=1.800 (melhor), forca=2.5, sr=50
#   TESTE M:   proporcional 25% → DD=96.5% blow-up 2026-06
#   TESTE N:   Kelly % + R:R=3.5 + all-hours → 4 trades (TP de 975p nunca atingido!)
#   TESTE O:   max_stop=50p + max_dur=500c + R:R=2.5 → PF=0.868 (SL artificial quebra estrutura)
#   TESTE P:   max_stop=50p skip + max_dur=500c + R:R=2.5 → PF=0.725 (tempo mata R:R)
#   TESTE Q:   sem filtro RAFI + sem cap stop + sem limite tempo → PF=1.118, 32 trades (1 simultâneo)
#   TESTE R:   igual Q + 3 posições simultâneas → maximiza frequência sem mudar WR/PF ← ATUAL
#
#   TESTE R: 3 posições simultâneas — unlock de frequência
#   Engine agora suporta múltiplos trades abertos ao mesmo tempo
#   Cada slot encontra seu próprio sinal de S/R independentemente
#   risco_por_trade=0.12 (próximo do Kelly ótimo 12.5%) × 3 slots = 36% total max
lote_proporcional: false       # Kelly % real
risco_por_trade: 0.12          # 12% por trade — próximo do Kelly ótimo (12.5%) para WR=37.5%/R:R=2.5
lote_base: 0.10               # não usado com proporcional=false; mantido p/ referência
capital_base: 200.0            # não usado com proporcional=false; mantido p/ referência
lote_maximo: 100.0             # limite máximo por trade (XM permite até 100 lotes)
lote_fixo: 0.00               # 0 = desativado (usa risco_por_trade acima)

# --- Gestão de risco ---
risco_maximo_diario: 9.0       # 900% — desativado no backtest; limite real em produção
max_trades_simultaneos: 3      # 3 trades simultâneos — multiplica frequência sem mudar WR/PF
max_perdas_por_dia: 3          # 3 perdas/dia → para; previne meses catastróficos
ratio_risco_retorno: 2.5       # R:R=2.5 — WR=37.5% dá PF=1.800 (comprovado no grid)

# --- Controle de duração e tamanho do stop ---
max_stop_pips: 0               # 0 = desativado — stop natural pelo swing_stop_lookback (TESTE Q)
max_duracao_candles: 0         # 0 = desativado — sai apenas em SL/TP (TESTE Q)
candle_corpo_minimo: 0.0       # 0.0 = desativado (corpo≥50% removeu ganhadores — TESTE K)

# --- Spread e slippage ---
spread_pips: 0.8               # spread médio EURUSD# XM Ultra Low
slippage_pips: 0.5             # slippage estimado em pontos

# --- Indicador RAFI ---
forca_limiar: 0.00             # RAFI ≥ 0 (desativado) — sem filtro de força; só trend+cor+S/R
forca_exaustao: -1.0           # desativado: com RAFI absoluto (≥0) nunca dispara; saída só por SL/TP

# --- Suporte e Resistência ---
sr_lookback: 50                # candles para trás para S/R (50 × 5min ≈ 4h)
sr_tolerancia: 0.0005          # tolerância de 5 pips para confirmar rompimento
swing_stop_lookback: 150       # OTIMIZADO via grid search: 150c=12.5h → WR=37.5%, PF=1.800 ← MELHOR
                               # Grid search confirmou: quanto maior o swing stop, mais espaço para o trade → WR sobe
                               # 50c→PF≈0.87 | 75c→PF≈1.12 | 100c→PF≈1.36 | 150c→PF=1.80 | 200c→trades insuficientes

# --- Médias Móveis (tendência M5) ---
ma_rapida: 20                  # MA20
ma_lenta: 50                   # MA50
ma_threshold: 0.0003           # 3 pips de diferença MA20-MA50 para confirmar tendência

# --- Bandas de Bollinger (timing de entrada) ---
bb_filtro_ativo: false         # false = desativado (testado: piora PF 1.118→0.963)
bb_periodo: 8                  # período do BB (estratégia RAFI usa 8)
bb_desvios: 2.0                # desvios padrão
bb_limiar_estreita: 0.0020     # BB estreita se largura < 20 pips (squeeze)
bb_abertura_minima: 0.0003     # BB deve abrir ≥ 3 pips acima do mínimo recente
bb_lookback: 3                 # candles de lookback para detectar squeeze

# --- Timeframes ---
timeframes:
  - "M5"                       # apenas M5 ativo

# --- Sessões ativas (UTC/GMT) ---
# TESTE N: todas as horas — maximiza número de trades para compor mais rápido
# TESTE anterior (L/M): 2 sessões (07-09h + 12-16h) davam ~64 trades em 3.5 anos
# All-hours esperado: ~200-256 trades em 3.5 anos (4× mais sinais)
sessoes:
  tudo:
    inicio: "00:00"
    fim: "23:59"               # 24h — sem filtro de sessão; busca máximo de trades

# --- Backtest ---
backtest:
  data_inicio: "2023-01-01"
  data_fim: "2026-07-03"
  timeframe_base: "M5"
  incluir_spread: true
  incluir_slippage: true

# --- Logging ---
log_nivel: "INFO"
log_arquivo: "logs/rafi_bot.log"

# --- Meta de capital ($20 → $300.000 em 6 meses) ---
meta_ajuste_capital: 1000.0    # a partir de $1000 recalibrar lote
meta_final: 300000.0
